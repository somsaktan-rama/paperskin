<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจบทความแพทย์ประจำบ้าน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
  <style>
    body { background-color: #f6f8fa; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .card { border-radius: 6px; border: 1px solid #d0d7de; box-shadow: 0 1px 3px rgba(27,31,36,0.12); margin-bottom: 20px; background: #fff;}
    .hidden { display: none !important; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 9999; }
    .spinner { border: 4px solid #e1e4e8; border-top: 4px solid #0969da; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="hidden">
    <div class="spinner"></div>
    <div class="mt-3 fw-bold" style="color:#24292f;" id="loadingText">กำลังประมวลผล...</div>
  </div>

<div id="loginPage" class="container" style="max-width: 400px; margin-top: 50px;">
    <div class="card p-4 text-center">
      <h4 class="mb-3" style="color: #24292f;">ระบบตรวจบทความ</h4>
      <div id="lineStatus" class="small mb-3 text-muted">กำลังตรวจสอบการเชื่อมต่อ LINE...</div>
      
      <input type="password" id="mdidInput" class="form-control mb-4 text-center fs-3" placeholder="MDID" readonly style="background-color: #f6f8fa; letter-spacing: 5px;">

      <div class="d-grid gap-2 mb-4" style="grid-template-columns: repeat(3, 1fr);">
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('1')">1</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('2')">2</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('3')">3</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('4')">4</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('5')">5</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('6')">6</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('7')">7</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('8')">8</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('9')">9</button>
        <button class="btn btn-danger fs-5 py-2 fw-bold" onclick="clearNumber()">C</button>
        <button class="btn btn-outline-secondary fs-4 py-2 fw-bold" onclick="addNumber('0')">0</button>
        <button class="btn btn-warning fs-5 py-2 fw-bold text-dark" onclick="deleteNumber()">⌫</button>
      </div>

      <button class="btn btn-success w-100 fs-5 py-2" style="background-color: #2da44e; border: none;" onclick="login()">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="selectionPage" class="container hidden" style="max-width: 600px;">
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">เลือกบทความ</h5>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">ออกจากระบบ</button>
      </div>
      <p id="userInfo" class="text-muted small"></p>
      
      <label class="fw-bold mb-1">เลือกหมวดหมู่ (Sheet):</label>
      <div class="d-flex gap-2 mb-3">
        <select id="sheetSelect" class="form-select" onchange="loadPapers()">
          <option value="">-- กรุณาเลือก --</option>
        </select>
        <button class="btn btn-primary text-nowrap" onclick="loadPapers()">ดึงข้อมูล</button>
      </div>

      <label class="fw-bold mb-1">เลือกบทความ:</label>
      <select id="paperSelect" class="form-select mb-3" onchange="showPaperDetails()">
        <option value="">-- รอการดึงข้อมูล --</option>
      </select>
      
      <div id="paperDetails" class="hidden p-3 mb-3" style="background: #ddf4ff; border-radius: 6px; border: 1px solid #b6e3ff;">
        <div class="mb-1"><strong>Publish:</strong> <span id="lblPublish"></span></div>
        <div class="mb-1"><strong>Link:</strong> <a href="#" id="lblLink" target="_blank">คลิกดูเอกสาร</a></div>
        <div><strong>จำนวน PASS:</strong> <span id="lblPassCount" class="badge bg-success"></span></div>
      </div>
      <button id="btnStartReview" class="btn btn-primary w-100 hidden" onclick="startReview()">เริ่มประเมิน</button>
    </div>
  </div>

  <div id="reviewPage" class="container hidden" style="max-width: 600px;">
    <div class="card p-4">
      <h5 class="mb-3 text-primary">ลงผลการตรวจ</h5>
      <h6 id="reviewTitle" class="mb-4 text-dark fw-bold"></h6>
      <label class="fw-bold mb-1">ผลการตรวจ (Result):</label>
      <select id="resultSelect" class="form-select mb-3" onchange="checkNoteRequired()">
        <option value="">-- เลือกผล --</option>
        <option value="PASS">PASS</option>
        <option value="FAIL">FAIL</option>
      </select>
      <label class="fw-bold mb-1">ข้อเสนอแนะ (Note):</label> <span id="noteStar" class="text-danger hidden">*</span>
      <textarea id="noteInput" class="form-control mb-4" rows="3" placeholder="ระบุเหตุผล (บังคับกรอกหาก FAIL)"></textarea>
      <div class="d-flex gap-2">
        <button class="btn btn-secondary w-50" onclick="cancelReview()">ยกเลิก / กลับ</button>
        <button id="btnSubmit" class="btn btn-success w-50" onclick="submitReview()">ยืนยันผล</button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ 1. ใส่ URL API ของ Google Apps Script ที่ลงท้ายด้วย /exec
    const API_URL = 'https://script.google.com/macros/s/AKfycbxOz9i0x2Qzfc036Gb5r2Tk02TOaAEnxlCp9nP7Lj7nK9HSqa9jOC9E68hIugcLQWk/exec'; 
    
    // ⚠️ 2. ใส่ LIFF ID (เช่น '1234567890-abcdefgh')
    const MY_LIFF_ID = '2009675466-B2Ivei1a'; 

    let currentUser = {};
    let currentPapers = [];
    let selectedPaper = {};
    let lineData = { uid: null, displayName: null };

    async function initializeLiff() {
      const statusEl = document.getElementById('lineStatus');
      try {
        if (MY_LIFF_ID === 'YOUR_LIFF_ID' || MY_LIFF_ID.trim() === '') {
          throw new Error("คุณยังไม่ได้ใส่รหัส LIFF ID ในโค้ด");
        }
        const initPromise = liff.init({ liffId: MY_LIFF_ID });
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("การเชื่อมต่อ LINE หมดเวลา")), 5000));
        await Promise.race([initPromise, timeoutPromise]);
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          lineData.uid = profile.userId;
          lineData.displayName = profile.displayName;
          statusEl.innerText = "✅ เชื่อมต่อ LINE: " + lineData.displayName;
          statusEl.className = "small mb-3 text-success fw-bold";
        } else {
          statusEl.innerText = "⚠️ ไม่ได้เปิดผ่าน LINE App (ใช้วิธีเก็บ Log ผ่าน Browser แทน)";
          statusEl.className = "small mb-3 text-warning fw-bold";
        }
      } catch (err) {
        statusEl.innerText = "❌ LINE Error: " + err.message;
        statusEl.className = "small mb-3 text-danger fw-bold";
        console.error(err);
      }
    }

    window.onload = initializeLiff;

    function showLoading(text) { document.getElementById('loadingText').innerText = text || "กำลังประมวลผล..."; document.getElementById('loadingOverlay').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

    async function callAPI(payload) {
      try {
        const response = await fetch(API_URL, { method: 'POST', redirect: "follow", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
        return await response.json();
      } catch (error) { return null; }
    }

    // 🟢 ระบบดึง IP, Device Type, OS, Browser
    async function getClientDetails() {
      let ip = "Unknown IP";
      const apiSources = [ 'https://api.ipify.org?format=json', 'https://ipinfo.io/json', 'https://api.db-ip.com/v2/free/self', 'https://api.seeip.org/jsonip' ];
      for (let url of apiSources) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3000); 
        try {
          const response = await fetch(url, { signal: controller.signal });
          clearTimeout(timeoutId); 
          if (!response.ok) continue; 
          const data = await response.json();
          if (data.ip) ip = data.ip; else if (data.ipAddress) ip = data.ipAddress;
          if (ip !== "Unknown IP") break; 
        } catch (err) { clearTimeout(timeoutId); }
      }

      const ua = navigator.userAgent;
      let browser = "Unknown Browser";
      let os = "Unknown OS";
      let deviceType = "Desktop";
      
      if (/Tablet|iPad/i.test(ua) || (ua.includes("Android") && !ua.includes("Mobile"))) { deviceType = "Tablet"; } 
      else if (/Mobile|iPhone|Android|Windows Phone/i.test(ua)) { deviceType = "Mobile"; }

      if (ua.includes("Win")) os = "Windows";
      else if (ua.includes("Mac")) { if (navigator.maxTouchPoints > 1) { os = "iPadOS"; deviceType = "Tablet"; } else { os = "macOS"; } }
      else if (ua.includes("iPhone")) os = "iOS"; else if (ua.includes("iPad")) os = "iPadOS";
      else if (ua.includes("Android")) os = "Android"; else if (ua.includes("Linux")) os = "Linux";

      if (ua.includes("Line") || ua.includes("LIFF")) browser = "LINE";
      else if (ua.includes("Firefox")) browser = "Firefox";
      else if (ua.includes("SamsungBrowser")) browser = "SamsungInternet";
      else if (ua.includes("Opera") || ua.includes("OPR") || ua.includes("Brave")) browser = "Opera/Brave";
      else if (ua.includes("Edg")) browser = "Edge"; else if (ua.includes("Chrome")) browser = "Chrome";
      else if (ua.includes("Safari")) browser = "Safari"; else browser = "Other";

      return { ip, browser, os, deviceType };
    }

    async function login() {
      const mdid = document.getElementById('mdidInput').value;
      if(!mdid) return alert('กรุณากรอก MDID');
      
      showLoading("กำลังเข้าสู่ระบบ...");
      const res = await callAPI({ action: 'verifyLogin', mdid: mdid, lineUid: lineData.uid, lineName: lineData.displayName });
      hideLoading();
      
      if(res && res.success) {
        currentUser = res;
        let displayName = res.isStudent ? `${res.staffName} ${res.year}` : res.staffName;
        document.getElementById('userInfo').innerText = `ผู้ใช้งาน: ${displayName} (${res.staffInst})`;
        
        const sheetSelect = document.getElementById('sheetSelect');
        sheetSelect.innerHTML = '<option value="">-- กรุณาเลือก --</option>';
        if(res.displaySheets && res.displaySheets.length > 0) {
          res.displaySheets.forEach(sheetName => {
            let opt = document.createElement('option'); opt.value = sheetName; opt.text = sheetName; sheetSelect.appendChild(opt);
          });
        }
        document.getElementById('loginPage').classList.add('hidden'); document.getElementById('selectionPage').classList.remove('hidden');
      } else { alert(res ? res.message : "เชื่อมต่อ API ไม่สำเร็จ"); }
    }

    async function loadPapers() {
      const sheet = document.getElementById('sheetSelect').value;
      const paperDropdown = document.getElementById('paperSelect');
      document.getElementById('paperDetails').classList.add('hidden'); document.getElementById('btnStartReview').classList.add('hidden');
      if(!sheet) { paperDropdown.innerHTML = '<option value="">-- กรุณาเลือกหมวดหมู่ก่อน --</option>'; return; }

      showLoading("กำลังดึงข้อมูล...");
      const res = await callAPI({ action: 'getPapers', sheetName: sheet, reviewerInst: currentUser.staffInst, reviewerName: currentUser.staffName });
      hideLoading();
      
      if(res && res.success) {
        currentPapers = res.data; paperDropdown.innerHTML = '<option value="">-- เลือกบทความ --</option>';
        if(currentPapers.length === 0) { paperDropdown.innerHTML = '<option value="">-- ไม่มีบทความ --</option>'; } 
        else {
           currentPapers.forEach((p, index) => {
             let opt = document.createElement('option'); opt.value = index; 
             let displayTitle = p.title ? p.title : "(ยังไม่ได้ส่งชื่อเรื่อง)";
             let baseText = `[${p.institute}] ${p.name} (PASS: ${p.passCount}) - ${displayTitle}`;
             
             if (currentUser.isStudent) {
               if (!p.title || p.title === "") { opt.text = `[${p.institute}] ${p.name} (PASS: ${p.passCount}) - (ยังไม่ได้ส่งชื่อเรื่อง)`; opt.disabled = true; opt.style.color = "#ff6b6b"; }
               else if (!p.link || p.link === "") { opt.text = `${baseText} (ยังไม่ส่งเอกสาร)`; opt.disabled = true; opt.style.color = "#74b9ff"; }
               else { opt.text = baseText; opt.style.color = "#24292f"; }
             } else {
               if (p.isOwnInst) { opt.text = `${baseText} (สถาบันตนเอง)`; opt.disabled = true; opt.style.color = "#a0a0a0"; }
               else if (p.isReviewed) { opt.text = `${baseText} (เคยตรวจแล้ว)`; opt.disabled = true; opt.style.color = "#a0a0a0"; }
               else if (p.passCount >= 3) { opt.text = `${baseText} (PASS ครบ 3 แล้ว)`; opt.disabled = true; opt.style.color = "#2da44e"; }
               else if (!p.title || p.title === "") { opt.text = `[${p.institute}] ${p.name} (PASS: ${p.passCount}) - (ยังไม่ได้ส่งชื่อเรื่อง)`; opt.disabled = true; opt.style.color = "#ff6b6b"; }
               else if (!p.link || p.link === "") { opt.text = `${baseText} (ยังไม่ส่งเอกสาร)`; opt.disabled = true; opt.style.color = "#74b9ff"; }
               else { opt.text = baseText; opt.style.color = "#24292f"; }
             }
             paperDropdown.appendChild(opt);
           });
        }
      } else {
        alert("⚠️ ระบบหลังบ้านพบปัญหา: " + (res ? res.message : "ค้นหาข้อมูลไม่สำเร็จ"));
        paperDropdown.innerHTML = `<option value="">-- เกิดข้อผิดพลาด --</option>`;
      }
    }

    function showPaperDetails() {
      const index = document.getElementById('paperSelect').value;
      const detailsDiv = document.getElementById('paperDetails');
      const btnStart = document.getElementById('btnStartReview');
      if(index === "") { detailsDiv.classList.add('hidden'); btnStart.classList.add('hidden'); return; }

      selectedPaper = currentPapers[index];
      document.getElementById('lblPublish').innerText = selectedPaper.publish || "-";
      const linkEl = document.getElementById('lblLink');
      if (selectedPaper.link) {
        let paperUrl = selectedPaper.link.startsWith('http') ? selectedPaper.link : 'https://' + selectedPaper.link;
        linkEl.href = paperUrl; linkEl.innerText = "คลิกดูเอกสาร"; linkEl.style.pointerEvents = "auto"; linkEl.className = "";
      } else { linkEl.href = "#"; linkEl.innerText = "ไม่มีลิงก์"; linkEl.style.pointerEvents = "none"; linkEl.className = "text-muted"; }
      
      document.getElementById('lblPassCount').innerText = selectedPaper.passCount + " คน";
      detailsDiv.classList.remove('hidden'); btnStart.classList.remove('hidden');

      if (currentUser.isStudent) { btnStart.disabled = true; btnStart.innerText = "ดูได้อย่างเดียว"; btnStart.className = "btn w-100 btn-secondary"; } 
      else { btnStart.disabled = false; btnStart.innerText = "เริ่มประเมิน"; btnStart.className = "btn w-100 btn-primary"; }
    }

    function startReview() {
      document.getElementById('selectionPage').classList.add('hidden'); document.getElementById('reviewPage').classList.remove('hidden');
      document.getElementById('reviewTitle').innerText = selectedPaper.title;
      document.getElementById('resultSelect').value = ""; document.getElementById('noteInput').value = ""; checkNoteRequired();
    }

    function checkNoteRequired() { document.getElementById('noteStar').classList.toggle('hidden', document.getElementById('resultSelect').value !== 'FAIL'); }
    function cancelReview() { document.getElementById('reviewPage').classList.add('hidden'); document.getElementById('selectionPage').classList.remove('hidden'); }

    async function submitReview() {
      const result = document.getElementById('resultSelect').value;
      const note = document.getElementById('noteInput').value;
      if(!result) return alert("กรุณาเลือกผลการตรวจ");
      if(result === 'FAIL' && !note.trim()) return alert("กรุณาระบุ Note");

      showLoading("กำลังบันทึกและตรวจสอบอุปกรณ์...");
      const client = await getClientDetails();
      let sigupData = lineData.displayName ? `${lineData.displayName},${client.deviceType},${client.os},${client.ip}` : `${client.deviceType},${client.os},${client.browser},${client.ip}`;

      const formData = { sheetName: document.getElementById('sheetSelect').value, rowNumber: selectedPaper.rowNumber, staffName: currentUser.staffName, result: result, note: note, sigup: sigupData };
      const res = await callAPI({ action: 'submitReview', formData: formData });
      hideLoading();

      if(res && res.success) { alert("บันทึกผลสำเร็จ!"); loadPapers(); cancelReview(); } else { alert("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง"); }
    }

    function logout() {
      document.getElementById('selectionPage').classList.add('hidden'); document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('mdidInput').value = ""; document.getElementById('sheetSelect').value = ""; document.getElementById('paperSelect').innerHTML = '<option value="">-- รอการดึงข้อมูล --</option>';
      document.getElementById('paperDetails').classList.add('hidden'); document.getElementById('btnStartReview').classList.add('hidden'); currentUser = {};
    }
  
  // 🟢 ระบบทำงานของแป้น Numpad
    function addNumber(num) {
      const input = document.getElementById('mdidInput');
      // จำกัดให้กรอกได้ไม่เกิน 5 หลัก (ปรับเลข 10 ได้ตามต้องการ)
      if (input.value.length < 5) { 
        input.value += num;
      }
    }

    function clearNumber() {
      document.getElementById('mdidInput').value = '';
    }

    function deleteNumber() {
      const input = document.getElementById('mdidInput');
      input.value = input.value.slice(0, -1);
    }
  
  </script>
</body>
</html>
